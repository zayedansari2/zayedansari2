<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 48" fill="none">
  <defs>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#020617" stop-opacity="0"/>
      <stop offset="20%" stop-color="#38bdf8" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.9"/>
      <stop offset="80%" stop-color="#38bdf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
      <animate attributeName="x1" values="-100%;0%;-100%" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0%;100%;0%" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <line x1="0" y1="24" x2="1200" y2="24" stroke="url(#line)" stroke-width="2" filter="url(#glow)"/>
  <circle cx="600" cy="24" r="6" fill="#38bdf8" opacity="0.9">
    <animate attributeName="r" values="5;8;5" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="24" r="14" fill="none" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="1">
    <animate attributeName="r" values="10;22;10" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.5;0;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
