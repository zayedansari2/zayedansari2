<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 12" preserveAspectRatio="none" fill="none">
  <defs>
    <linearGradient id="edge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="560" height="12" rx="6" fill="#ffffff" fill-opacity="0.04" stroke="url(#edge)" stroke-width="1"/>
  <rect x="20" y="3" width="120" height="2" rx="1" fill="#38bdf8" opacity="0.6">
    <animate attributeName="x" values="20;420;20" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="5s" repeatCount="indefinite"/>
  </rect>
</svg>
